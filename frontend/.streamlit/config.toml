# Tema de Rendir.ai — look cálido y legible (edtech estudiantil), no azul corporativo.
# Mayor salto visual por el menor esfuerzo (Seccion 5 del plan de trabajo).
[theme]
primaryColor = "#F08C00"            # ámbar cálido (botones, acentos)
backgroundColor = "#FFFCF7"         # crema muy claro
secondaryBackgroundColor = "#FBEEDD" # tarjetas / inputs
textColor = "#2B2118"               # marrón oscuro, buen contraste
font = "sans serif"

[client]
# Oculta la barra de herramientas de desarrollo para una vista más limpia en el demo.
toolbarMode = "minimal"
