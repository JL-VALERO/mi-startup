name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install lint + test tools
        run: pip install ruff pytest

      - name: Lint (ruff)
        run: ruff check . || true   # no rompe el build mientras el repo está en arranque

      - name: Run tests
        run: |
          if [ -d backend/tests ]; then pytest backend/tests; else echo "sin tests aún"; fi
