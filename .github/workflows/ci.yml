name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-and-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      # Instalamos solo lo necesario para lint + tests del contrato del API.
      # PaddleOCR/paddlepaddle (pesados) NO se instalan: el OCR real se valida
      # a mano. Los imports pesados son perezosos, así que los tests no los necesitan.
      - name: Install lint + test tools
        run: pip install ruff pytest fastapi httpx python-multipart

      - name: Lint (ruff)
        run: ruff check . || true   # no rompe el build mientras el repo arranca

      - name: Run tests
        working-directory: backend
        run: pytest tests -q
