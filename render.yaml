# Blueprint de despliegue del backend de Rendir.ai en Render (plan free).
#
# Runtime DOCKER (backend/Dockerfile): la imagen trae LaTeX (pdflatex) para que
# /generate_pdf (la guía en PDF) funcione también en el deploy, no solo en local.
# Sigue siendo "solo-Claude": NO instala PaddleOCR (corre en local).
#
# La ANTHROPIC_API_KEY se ingresa en el panel de Render (sync: false), NUNCA aquí.
services:
  - type: web
    name: rendir-ai-backend
    runtime: docker
    rootDir: backend
    dockerfilePath: ./Dockerfile
    dockerContext: .
    plan: free
    healthCheckPath: /health
    autoDeploy: true
    envVars:
      - key: ANTHROPIC_MODEL
        value: claude-sonnet-4-6
      - key: OCR_LANG
        value: es
      - key: USE_GPU
        value: "false"
      - key: ANTHROPIC_API_KEY
        sync: false
